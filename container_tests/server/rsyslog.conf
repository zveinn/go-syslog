global(
    processInternalMessages="on"
    workDirectory="/tmp"
    maxMessageSize="32k"
    # %rawmsg% should be the literal bytes from the wire. By default
    # rsyslog rewrites control chars (incl. TAB) to #NNN octal escapes
    # and 8-bit bytes similarly; turn both off so byte-exact diffs work.
    parser.escapeControlCharactersOnReceive="off"
    parser.escape8BitCharactersOnReceive="off"
)

# Sized to absorb a 50k-message burst without dropping. main_queue is the
# global queue rsyslog feeds from after parsing; the ruleset queue feeds the
# omfile action.
main_queue(queue.size="500000" queue.dequeueBatchSize="1000")

module(load="imudp")
module(load="imtcp")

# Preserve the exact wire-level message (PRI onward) and tag the input source.
template(name="raw" type="string" string="[%inputname%] %rawmsg%\n")

ruleset(name="capture" queue.size="500000") {
    action(type="omfile" file="/var/log/received.log" template="raw")
}

input(type="imudp" port="514" ruleset="capture" rcvbufSize="8388608")
input(type="imtcp" port="514" ruleset="capture" SupportOctetCountedFraming="on")
