global(processInternalMessages="on" workDirectory="/tmp")

module(load="imudp")
module(load="imtcp")

input(type="imudp" port="514")
input(type="imtcp" port="514" SupportOctetCountedFraming="on")

# Capture the message exactly as received over the network, including PRI.
template(name="raw" type="string" string="[%inputname%] %rawmsg%\n")

*.* action(type="omfile" file="/var/log/received.log" template="raw")
